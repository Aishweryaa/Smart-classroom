# ============================================================
# Smart Classroom Management System - Application Properties
# ============================================================

# --- Server Configuration ---
server.port=8080

# --- DataSource (MySQL) ---
# UPDATE these credentials to match your local MySQL setup
spring.datasource.url=jdbc:mysql://localhost:3306/smart_classroom?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=@Aishwerya1911
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---
# validate = checks schema matches entities (use 'update' during dev to auto-alter tables)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# --- Thymeleaf ---
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# --- Logging ---
logging.level.com.smartclassroom=DEBUG
logging.level.org.springframework.security=INFO

# --- Application Info ---
spring.application.name=SmartClassroom