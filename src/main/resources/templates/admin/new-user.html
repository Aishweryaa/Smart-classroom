<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Add User')}"></head>
<body>
<div class="app-layout">
  <nav th:replace="~{fragments/layout :: navbar}"></nav>
  <div class="app-body">
    <aside th:replace="~{fragments/layout :: sidebar-admin(activePage='users')}"></aside>
    <main class="main-content">
      <div th:replace="~{fragments/layout :: alerts}"></div>
      <div class="page-header">
        <h1><i class="fas fa-user-plus"></i> Add New User</h1>
        <a th:href="@{/admin/users}" class="btn-secondary"><i class="fas fa-arrow-left"></i> Back</a>
      </div>
      <div class="card" style="max-width:560px">
        <div class="card-header"><h3>User Details</h3></div>
        <div class="card-body">
          <form th:action="@{/admin/users/new}" th:object="${user}" method="post" class="inline-form-v">
            <div class="form-group">
              <label>Full Name</label>
              <input type="text" th:field="*{fullName}" required placeholder="Dr. John Doe"/>
            </div>
            <div class="form-group">
              <label>Username</label>
              <input type="text" th:field="*{username}" required placeholder="johndoe"/>
            </div>
            <div class="form-group">
              <label>Email</label>
              <input type="email" th:field="*{email}" required placeholder="john@college.edu"/>
            </div>
            <div class="form-group">
              <label>Password</label>
              <input type="password" th:field="*{password}" required placeholder="Min 6 characters"/>
            </div>
            <div class="form-group">
              <label>Role</label>
              <select th:field="*{role}">
                <option th:each="r : ${roles}" th:value="${r}" th:text="${r}"></option>
              </select>
            </div>
            <button type="submit" class="btn-primary"><i class="fas fa-save"></i> Create User</button>
          </form>
        </div>
      </div>
    </main>
  </div>
</div>
</body>
</html>
