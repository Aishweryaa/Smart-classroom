
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Manage Students')}"></head>
<body>
<div class="app-layout">
  <nav th:replace="~{fragments/layout :: navbar}"></nav>
  <div class="app-body">
    <aside th:replace="~{fragments/layout :: sidebar-admin(activePage='classrooms')}"></aside>
    <main class="main-content">
      <div th:replace="~{fragments/layout :: alerts}"></div>

      <div class="page-header">
        <div>
          <h1><i class="fas fa-users"></i> Manage Students</h1>
          <p class="page-subtitle">
            <span th:text="${className}">Class</span>
            &nbsp;(<span th:text="${classCode}">Code</span>)
          </p>
        </div>
        <a th:href="@{/admin/classrooms}" class="btn-secondary">
          <i class="fas fa-arrow-left"></i> Back to Classrooms
        </a>
      </div>

      <!-- Enroll Form -->
      <div class="card">
        <div class="card-header"><h3><i class="fas fa-user-plus"></i> Enroll a Student</h3></div>
        <div class="card-body">
          <form th:action="@{/admin/classrooms/enroll}" method="post" class="inline-form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <input type="hidden" name="classroomId" th:value="${classroomId}"/>
            <select name="studentId" required style="min-width:260px">
              <option value="">-- Select Student to Enroll --</option>
              <option th:each="s : ${allStudents}"
                      th:value="${s.id}"
                      th:text="${s.fullName + ' (' + s.username + ')'}"></option>
            </select>
            <button type="submit" class="btn-primary">
              <i class="fas fa-user-plus"></i> Enroll
            </button>
          </form>
        </div>
      </div>

      <!-- Currently Enrolled Students -->
      <div class="card">
        <div class="card-header">
          <h3><i class="fas fa-list"></i> Currently Enrolled Students</h3>
          <span class="badge info" th:text="${enrolledStudents.size() + ' students'}">0</span>
        </div>
        <div class="card-body">
          <div th:if="${enrolledStudents.size() == 0}" class="empty-state">
            <i class="fas fa-user-graduate"></i>
            <p>No students enrolled yet. Use the form above to enroll students.</p>
          </div>
          <table th:if="${enrolledStudents.size() > 0}" class="data-table">
            <thead>
              <tr><th>#</th><th>Student Name</th><th>Username</th><th>Email</th><th>Remove</th></tr>
            </thead>
            <tbody>
              <tr th:each="s, i : ${enrolledStudents}">
                <td th:text="${i.index + 1}">1</td>
                <td th:text="${s.fullName}">Name</td>
                <td><code th:text="${s.username}">user</code></td>
                <td th:text="${s.email}">email</td>
                <td>
                  <form th:action="@{/admin/classrooms/unenroll}" method="post"
                        onsubmit="return confirm('Remove this student?')">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <input type="hidden" name="studentId"   th:value="${s.id}"/>
                    <input type="hidden" name="classroomId" th:value="${classroomId}"/>
                    <button type="submit" class="btn-icon danger">
                      <i class="fas fa-user-minus"></i>
                    </button>
                  </form>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

    </main>
  </div>
</div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
