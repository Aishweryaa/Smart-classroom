<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<!--
  fragments/layout.html
  Master layout: navbar + sidebar + content slot.
  All pages extend this with th:replace or th:insert.
-->
<head th:fragment="head(pageTitle)">
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="${pageTitle} + ' | SmartClass'">SmartClass</title>
  <link rel="stylesheet" th:href="@{/css/main.css}"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>

<!-- Shared navbar fragment -->
<nav th:fragment="navbar" class="navbar">
  <div class="navbar-brand">
    <i class="fas fa-graduation-cap"></i>
    <span>SmartClass</span>
  </div>
  <div class="navbar-user">
    <span class="user-badge" sec:authorize="hasRole('ADMIN')">Admin</span>
    <span class="user-badge faculty" sec:authorize="hasRole('FACULTY')">Faculty</span>
    <span class="user-badge student" sec:authorize="hasRole('STUDENT')">Student</span>
    <span class="navbar-username" sec:authentication="name">User</span>
    <form th:action="@{/logout}" method="post" style="margin:0">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <button type="submit" class="btn-logout">
        <i class="fas fa-sign-out-alt"></i> Logout
      </button>
    </form>
  </div>
</nav>

<!-- Sidebar for student -->
<aside th:fragment="sidebar-student" class="sidebar">
  <ul class="sidebar-nav">
    <li><a th:href="@{/student/dashboard}" th:classappend="${activePage=='dashboard'?'active':''}">
      <i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
    <li><a th:href="@{/student/classes}" th:classappend="${activePage=='classes'?'active':''}">
      <i class="fas fa-chalkboard"></i> My Classes</a></li>
    <li><a th:href="@{/student/attendance}" th:classappend="${activePage=='attendance'?'active':''}">
      <i class="fas fa-calendar-check"></i> Attendance</a></li>
    <li><a th:href="@{/student/planner}" th:classappend="${activePage=='planner'?'active':''}">
      <i class="fas fa-tasks"></i> Study Planner</a></li>
  </ul>
</aside>

<!-- Sidebar for faculty -->
<aside th:fragment="sidebar-faculty" class="sidebar">
  <ul class="sidebar-nav">
    <li><a th:href="@{/faculty/dashboard}" th:classappend="${activePage=='dashboard'?'active':''}">
      <i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
    <li><a th:href="@{/faculty/classes}" th:classappend="${activePage=='classes'?'active':''}">
      <i class="fas fa-chalkboard-teacher"></i> My Classes</a></li>
  </ul>
</aside>

<!-- Sidebar for admin -->
<aside th:fragment="sidebar-admin" class="sidebar">
  <ul class="sidebar-nav">
    <li><a th:href="@{/admin/dashboard}" th:classappend="${activePage=='dashboard'?'active':''}">
      <i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
    <li><a th:href="@{/admin/users}" th:classappend="${activePage=='users'?'active':''}">
      <i class="fas fa-users"></i> Users</a></li>
    <li><a th:href="@{/admin/classrooms}" th:classappend="${activePage=='classrooms'?'active':''}">
      <i class="fas fa-school"></i> Classrooms</a></li>
    <li><a th:href="@{/admin/reports}" th:classappend="${activePage=='reports'?'active':''}">
      <i class="fas fa-chart-bar"></i> Reports</a></li>
  </ul>
</aside>

<!-- Alert flash messages fragment -->
<div th:fragment="alerts">
  <div th:if="${successMsg}" class="alert alert-success">
    <i class="fas fa-check-circle"></i> <span th:text="${successMsg}"></span>
  </div>
  <div th:if="${errorMsg}" class="alert alert-error">
    <i class="fas fa-exclamation-circle"></i> <span th:text="${errorMsg}"></span>
  </div>
</div>
</html>
