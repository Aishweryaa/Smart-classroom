
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Manage Classrooms')}"></head>
<body>
<div class="app-layout">
  <nav th:replace="~{fragments/layout :: navbar}"></nav>
  <div class="app-body">
    <aside th:replace="~{fragments/layout :: sidebar-admin(activePage='classrooms')}"></aside>
    <main class="main-content">
      <div th:replace="~{fragments/layout :: alerts}"></div>

      <div class="page-header">
        <div>
          <h1><i class="fas fa-school"></i> Manage Classrooms</h1>
          <p class="page-subtitle">Create classrooms and enroll students.</p>
        </div>
        <button class="btn-primary" onclick="toggleModal('addClassModal')">
          <i class="fas fa-plus"></i> Add Classroom
        </button>
      </div>

      <div class="card">
        <div class="card-header"><h3>All Classrooms</h3></div>
        <div class="card-body">
          <div th:if="${classrooms == null or classrooms.size() == 0}" class="empty-state">
            <i class="fas fa-school"></i>
            <p>No classrooms yet.</p>
          </div>
          <table th:if="${classrooms != null and classrooms.size() > 0}" class="data-table">
            <thead>
              <tr><th>#</th><th>Code</th><th>Class Name</th><th>Faculty</th><th>Actions</th></tr>
            </thead>
            <tbody>
              <tr th:each="cls, i : ${classrooms}">
                <td th:text="${i.index + 1}">1</td>
                <td><span class="class-code-sm" th:text="${cls.classCode}">CS301</span></td>
                <td th:text="${cls.className}">Name</td>
                <td th:text="${cls.faculty.fullName}">Faculty</td>
                <td class="actions-cell">
                  <a th:href="@{/admin/classrooms/manage/{id}(id=${cls.id})}" class="btn-primary btn-sm">
                    <i class="fas fa-users"></i> Manage Students
                  </a>
                  <form th:action="@{/admin/classrooms/delete/{id}(id=${cls.id})}" method="post"
                        onsubmit="return confirm('Delete this classroom?')">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn-icon danger"><i class="fas fa-trash"></i></button>
                  </form>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

    </main>
  </div>
</div>

<!-- Add Classroom Modal -->
<div id="addClassModal" class="modal-overlay" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <h3><i class="fas fa-plus"></i> Add New Classroom</h3>
      <button class="modal-close" onclick="toggleModal('addClassModal')">&#x2715;</button>
    </div>
    <form th:action="@{/admin/classrooms/add}" th:object="${newClass}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <div class="modal-body">
        <div class="form-row">
          <div class="form-group">
            <label>Class Code *</label>
            <input type="text" th:field="*{classCode}" required placeholder="e.g. CS301"/>
          </div>
          <div class="form-group">
            <label>Class Name *</label>
            <input type="text" th:field="*{className}" required placeholder="Data Structures"/>
          </div>
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea th:field="*{description}" rows="2" placeholder="Optional..."></textarea>
        </div>
        <div class="form-group">
          <label>Assign Faculty *</label>
          <select name="facultyId" required>
            <option value="">-- Select Faculty --</option>
            <option th:each="f : ${faculty}" th:value="${f.id}"
                    th:text="${f.fullName + ' (' + f.username + ')'}"></option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn-secondary" onclick="toggleModal('addClassModal')">Cancel</button>
        <button type="submit" class="btn-primary"><i class="fas fa-save"></i> Create</button>
      </div>
    </form>
  </div>
</div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
