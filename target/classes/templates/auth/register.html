<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register | SmartClass</title>
  <link rel="stylesheet" th:href="@{/css/main.css}"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body class="auth-body">

<div class="auth-container">
  <div class="auth-panel-left">
    <div class="auth-brand">
      <div class="brand-icon"><i class="fas fa-graduation-cap"></i></div>
      <h1>SmartClass</h1>
      <p>Join thousands of students and faculty managing their academic journey smarter.</p>
    </div>
  </div>

  <div class="auth-panel-right">
    <div class="auth-card">
      <h2>Create Account</h2>
      <p class="auth-subtitle">Fill in your details to register</p>

      <div th:if="${errorMsg}" class="alert alert-error">
        <i class="fas fa-exclamation-circle"></i>
        <span th:text="${errorMsg}"></span>
      </div>

      <form th:action="@{/register}" th:object="${user}" method="post" class="auth-form">
        <div class="form-group">
          <label><i class="fas fa-id-card"></i> Full Name</label>
          <input type="text" th:field="*{fullName}" placeholder="Your full name" required/>
          <span class="field-error" th:if="${#fields.hasErrors('fullName')}"
                th:errors="*{fullName}"></span>
        </div>
        <div class="form-group">
          <label><i class="fas fa-user"></i> Username</label>
          <input type="text" th:field="*{username}" placeholder="Choose a username" required/>
          <span class="field-error" th:if="${#fields.hasErrors('username')}"
                th:errors="*{username}"></span>
        </div>
        <div class="form-group">
          <label><i class="fas fa-envelope"></i> Email</label>
          <input type="email" th:field="*{email}" placeholder="your@email.com" required/>
        </div>
        <div class="form-group">
          <label><i class="fas fa-lock"></i> Password</label>
          <input type="password" th:field="*{password}" placeholder="Min 6 characters" required/>
        </div>
        <div class="form-group">
          <label><i class="fas fa-user-tag"></i> Role</label>
          <select th:field="*{role}">
            <option th:each="r : ${roles}" th:value="${r}" th:text="${r}"></option>
          </select>
        </div>
        <button type="submit" class="btn-primary btn-full">
          <i class="fas fa-user-plus"></i> Register
        </button>
      </form>

      <p class="auth-switch">
        Already have an account? <a th:href="@{/login}">Sign in</a>
      </p>
    </div>
  </div>
</div>
</body>
</html>
