
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Class Detail')}"></head>
<body>
<div class="app-layout">
  <nav th:replace="~{fragments/layout :: navbar}"></nav>
  <div class="app-body">
    <aside th:replace="~{fragments/layout :: sidebar-faculty(activePage='classes')}"></aside>
    <main class="main-content">
      <div th:replace="~{fragments/layout :: alerts}"></div>

      <div class="page-header">
        <div>
          <h1 th:text="${classroom.className}">Class Name</h1>
          <p class="page-subtitle" th:text="${classroom.classCode}">Code</p>
        </div>
        <div style="display:flex;gap:.6rem">
          <a th:href="@{/faculty/attendance/{id}(id=${classroom.id})}" class="btn-primary">
            <i class="fas fa-calendar-check"></i> Mark Attendance
          </a>
          <a th:href="@{/faculty/classes}" class="btn-secondary">
            <i class="fas fa-arrow-left"></i> Back
          </a>
        </div>
      </div>

      <div class="two-col">

        <!-- Enrolled Students -->
        <div class="card">
          <div class="card-header">
            <h3><i class="fas fa-users"></i> Enrolled Students</h3>
            <span class="badge info" th:text="${enrollments.size() + ' students'}">0</span>
          </div>
          <div class="card-body">
            <div th:if="${enrollments.size() == 0}" class="empty-state">
              <i class="fas fa-users"></i>
              <p>No students enrolled yet.</p>
            </div>
            <div th:each="enr : ${enrollments}" class="list-item">
              <div class="list-item-icon"><i class="fas fa-user-graduate"></i></div>
              <div class="list-item-content">
                <strong th:text="${enr.student.fullName}">Name</strong>
                <span th:text="${enr.student.email}">email</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Add Schedule -->
        <div class="card">
          <div class="card-header">
            <h3><i class="fas fa-clock"></i> Class Schedule</h3>
            <button class="btn-primary btn-sm" onclick="toggleModal('addScheduleModal')">
              <i class="fas fa-plus"></i> Add Schedule
            </button>
          </div>
          <div class="card-body">
            <div th:if="${schedules.size() == 0}" class="empty-state">
              <i class="fas fa-calendar"></i>
              <p>No schedules added yet. Click "Add Schedule" to add one.</p>
            </div>
            <div th:each="sch : ${schedules}" class="list-item">
              <div class="list-item-icon blue"><i class="fas fa-calendar-day"></i></div>
              <div class="list-item-content">
                <strong th:text="${sch.dayOfWeek}">DAY</strong>
                <span th:text="${sch.startTime + ' - ' + sch.endTime}">Time</span>
              </div>
              <span class="badge info" th:text="'Room: ' + ${sch.roomNumber != null ? sch.roomNumber : 'TBD'}">Room</span>
              <form th:action="@{/faculty/schedule/delete/{id}(id=${sch.id})}" method="post"
                    onsubmit="return confirm('Delete this schedule?')">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn-icon danger"><i class="fas fa-trash"></i></button>
              </form>
            </div>
          </div>
        </div>

      </div>

      <!-- Announcements -->
      <div class="card">
        <div class="card-header">
          <h3><i class="fas fa-bullhorn"></i> Class Announcements</h3>
          <button class="btn-primary btn-sm" onclick="toggleModal('addAnnModal')">
            <i class="fas fa-plus"></i> Post Announcement
          </button>
        </div>
        <div class="card-body">
          <div th:if="${announcements.size() == 0}" class="empty-state">
            <i class="fas fa-bullhorn"></i>
            <p>No announcements yet.</p>
          </div>
          <div th:each="ann : ${announcements}" class="announcement-item">
            <div class="ann-header">
              <strong th:text="${ann.title}">Title</strong>
              <small th:if="${ann.createdAt != null}"
                     th:text="${#temporals.format(ann.createdAt,'dd MMM yyyy')}"></small>
            </div>
            <p th:text="${ann.content}">Content</p>
          </div>
        </div>
      </div>

    </main>
  </div>
</div>

<!-- Add Schedule Modal -->
<div id="addScheduleModal" class="modal-overlay" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <h3><i class="fas fa-clock"></i> Add Class Schedule</h3>
      <button class="modal-close" onclick="toggleModal('addScheduleModal')">&#x2715;</button>
    </div>
    <form th:action="@{/faculty/schedule/add}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <input type="hidden" name="classroomId" th:value="${classroom.id}"/>
      <div class="modal-body">
        <div class="form-group">
          <label>Day of Week *</label>
          <select name="dayOfWeek" required>
            <option value="">-- Select Day --</option>
            <option value="MONDAY">Monday</option>
            <option value="TUESDAY">Tuesday</option>
            <option value="WEDNESDAY">Wednesday</option>
            <option value="THURSDAY">Thursday</option>
            <option value="FRIDAY">Friday</option>
            <option value="SATURDAY">Saturday</option>
          </select>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Start Time *</label>
            <input type="time" name="startTime" required placeholder="09:00"/>
          </div>
          <div class="form-group">
            <label>End Time *</label>
            <input type="time" name="endTime" required placeholder="10:00"/>
          </div>
        </div>
        <div class="form-group">
          <label>Room Number</label>
          <input type="text" name="roomNumber" placeholder="e.g. A-101"/>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn-secondary" onclick="toggleModal('addScheduleModal')">Cancel</button>
        <button type="submit" class="btn-primary"><i class="fas fa-save"></i> Add Schedule</button>
      </div>
    </form>
  </div>
</div>

<!-- Post Announcement Modal -->
<div id="addAnnModal" class="modal-overlay" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <h3><i class="fas fa-bullhorn"></i> Post Announcement</h3>
      <button class="modal-close" onclick="toggleModal('addAnnModal')">&#x2715;</button>
    </div>
    <form th:action="@{/faculty/announcements/post}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <input type="hidden" name="classroomId" th:value="${classroom.id}"/>
      <div class="modal-body">
        <div class="form-group">
          <label>Title *</label>
          <input type="text" name="title" required placeholder="e.g. Quiz next week"/>
        </div>
        <div class="form-group">
          <label>Content *</label>
          <textarea name="content" rows="3" required placeholder="Write your announcement..."></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn-secondary" onclick="toggleModal('addAnnModal')">Cancel</button>
        <button type="submit" class="btn-primary"><i class="fas fa-paper-plane"></i> Post</button>
      </div>
    </form>
  </div>
</div>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
